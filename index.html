<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="陈琦律师团队HS编码税率查询器 - 快速查询海关编码及税率信息，支持综合税率计算">
    <title>陈琦律师团队HS编码税率查询器</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .search-box {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .search-input-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: #3b82f6;
        }

        .search-tips {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            text-align: center;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-manual {
            flex: 1;
            padding: 10px;
            background: #f0f7ff;
            color: #3b82f6;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-manual:hover {
            background: #3b82f6;
            color: white;
        }

        .results-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }

        .result-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item:hover {
            background: #f8f9fa;
        }

        .result-item:active {
            background: #e3f2fd;
        }

        .hs-code {
            font-size: 16px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 5px;
        }

        .product-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .tax-rates {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 12px;
        }

        .tax-tag {
            background: #f0f7ff;
            color: #3b82f6;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .tax-tag.vat {
            background: #f0fdf4;
            color: #22c55e;
        }

        .tax-tag.consumption {
            background: #fef3f2;
            color: #ef4444;
        }

        .tax-tag.comprehensive {
            background: #3b82f6;
            color: white;
            font-weight: bold;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 20px;
            border-radius: 16px 16px 0 0;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .modal-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .modal-body {
            padding: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
        }

        .input-group input:read-only {
            background: #f5f5f5;
            color: #666;
        }

        .calc-result {
            background: #f0f7ff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .calc-result-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .calc-result-value {
            font-size: 28px;
            font-weight: bold;
            color: #3b82f6;
        }

        .tax-evasion-result {
            background: #fef3f2;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }

        .tax-evasion-value {
            font-size: 24px;
            font-weight: bold;
            color: #ef4444;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .install-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #3b82f6;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            display: none;
            z-index: 999;
        }

        .install-btn.show {
            display: block;
        }

        .stats-bar {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
        }

        /* 响应式优化 */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 20px;
            }
            
            .results-container {
                max-height: calc(100vh - 260px);
            }
            
            .tax-rates {
                gap: 4px;
            }
            
            .tax-tag {
                padding: 2px 6px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>陈琦律师团队HS编码税率查询器</h1>
            <p>快速查询海关编码及税率信息</p>
            <div class="stats-bar" id="statsBar">正在加载数据...</div>
        </div>

        <div class="search-box">
            <div class="search-input-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="输入HS编码或商品名称搜索...">
            </div>
            <div class="search-tips">支持模糊搜索，如输入"牛"可匹配"牛肉"、"牛皮"等；输入"智手"可匹配"智能手机"</div>
            <div class="lawyer-tips" style="text-align: center; color: #3b82f6; font-size: 13px; margin: 10px 0; font-weight: 500;">走私辩护，找三人刑陈琦律师。电话/微信18520338805</div>
            <div class="action-buttons">
                <button class="btn-manual" onclick="openManualCalc()">手动核算</button>
            </div>
        </div>

        <div class="results-container" id="resultsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <div>正在加载数据...</div>
            </div>
        </div>
    </div>

    <!-- 税率计算模态框 -->
    <div class="modal" id="calcModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">商品核算</div>
                <div class="modal-subtitle" id="modalSubtitle"></div>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>HS编码</label>
                    <input type="text" id="hsCodeInput" readonly>
                </div>
                <div class="input-group">
                    <label>商品名称</label>
                    <input type="text" id="productNameInput" readonly>
                </div>
                <div class="input-group">
                    <label>关税税率 (%)</label>
                    <input type="number" id="tariffRate" step="0.01" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>增值税率 (%)</label>
                    <input type="number" id="vatRate" step="0.01" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>消费税率 (%)</label>
                    <input type="number" id="consumptionRate" step="0.01" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>走私货值 (元)</label>
                    <input type="number" id="goodsValue" placeholder="请输入货值">
                </div>
                
                <div class="calc-result">
                    <div class="calc-result-title">综合税率</div>
                    <div class="calc-result-value" id="comprehensiveRate">0.00%</div>
                </div>
                
                <div class="tax-evasion-result" id="taxEvasionSection" style="display: none;">
                    <div class="calc-result-title">偷逃税额</div>
                    <div class="tax-evasion-value" id="taxEvasionAmount">¥0.00</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
                <button class="btn btn-primary" onclick="calculateTax()">计算</button>
            </div>
        </div>
    </div>

    <button class="install-btn" id="installBtn">安装应用</button>

    <!-- Dexie.js for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
